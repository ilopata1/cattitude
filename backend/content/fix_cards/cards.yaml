# Purpose: Default Fix It troubleshooting cards (before equipment fragment enrichment).
# Used by: content.assembler.build_fix_cards_module
# Module: fix_card_set / all
# Slots: {contact_step}, twin_engine append on overheating step
#

cards:
- key: engine_wont_start
  when:
    has_category:
    - propulsion_and_machinery
  icon: 🔴
  cat: engine
  catL: Engine
  title: Engine won't start
  steps:
  - Confirm raw water seacock OPEN (handle parallel to pipe) in the engine compartment
  - Check the engine circuit breaker is ON in the engine compartment
  - Confirm the engine battery switch is on and voltage is above 12.0V
  - Confirm throttle is in neutral before starting
  - Never crank more than 10 seconds — risk of water in the exhaust
  - '{contact_step}'
- key: engine_overheating
  when:
    has_category:
    - propulsion_and_machinery
  icon: ⚠️
  cat: engine
  catL: Engine
  title: Engine overheating alarm
  steps:
  - text: IMMEDIATELY reduce RPM
    append_when:
      twin_engine: ' — switch to the other engine if possible'
  - Check raw water flow from the exhaust — must be a continuous stream
  - Check the raw water strainer for blockage — clear if needed
  - Confirm the raw water seacock is fully open
  - No water from the exhaust = impeller failed — do not run the engine
  - Do not restart until water flow is confirmed
  - '{contact_step}'
- key: toilet_wont_flush
  when:
    has_category:
    - sanitation
  icon: 🚽
  cat: plumbing
  catL: Plumbing
  title: Toilet won't flush
  steps:
  - Check the circuit breaker for that head at the main panel — reset if tripped
  - Confirm the fresh water pump is on
  - Hold the flush switch for a full 10+ second cycle
  - Check for blockage — almost always caused by paper products or foreign objects
  - Do NOT try to disassemble the toilet
  - 'REMINDER: Nothing goes in the head except human waste — no TP, no wipes, ever'
  - '{contact_step}'
- key: holding_tank_full
  when:
    has_category:
    - sanitation
  icon: 🪣
  cat: plumbing
  catL: Plumbing
  title: Holding tank full / toilet smell
  steps:
  - 'If at a marina: pump out via the waste deck fitting'
  - 'If offshore in deep water where discharge is permitted: open the evacuation valve, close immediately when done'
  - Do not force the pump if the tank is truly full
  - Flush with several cycles after the tank is emptied
  - '{contact_step}'
- key: no_fresh_water
  when:
    has_category:
    - fresh_water_and_plumbing
  icon: 💧
  cat: plumbing
  catL: Plumbing
  title: No fresh water at taps
  steps:
  - Check the fresh water pump DC breaker at the main panel
  - Check the fresh water tank level — tanks may be empty
  - Turn the pressure pump switch off and back on to reset
  - '{contact_step}'
- key: watermaker
  when:
    has_watermaker: true
  icon: 🌊
  cat: plumbing
  catL: Plumbing
  title: Watermaker not producing / poor water quality
  steps:
  - Check the watermaker breaker at the panel is ON
  - Confirm sufficient power — most watermakers need the generator or strong charge
  - Check the salinity indicator — if reading high, do not send water to the tanks
  - Confirm you are in clean, deep, open water — not shallow, sandy, or near a marina
  - 'If the unit runs but salinity stays high: stop it — membranes may be contaminated'
  - '{contact_step}'
- key: something_stopped
  when:
    has_category:
    - electrical_dc
  icon: ⚡
  cat: electrical
  catL: Electrical
  title: Something stopped working
  steps:
  - Find the breaker for that circuit at the main DC panel
  - Switch it fully OFF then back ON to reset
  - 'If the breaker trips again immediately: fault — leave it off'
  - Check battery voltage — when low, some systems auto-shut off
  - '{contact_step}'
- key: low_battery
  when:
    has_category:
    - electrical_dc
  icon: 🪫
  cat: electrical
  catL: Electrical
  title: Low battery
  steps:
  - 'Turn off all high-draw loads: AC units, electric cooking, watermaker, microwave'
  - Start the engine(s) and run at fast idle until the house bank recovers
  - If fitted, run the generator or connect shore power to charge
  - Do not run high-draw loads again until the bank has recovered
  - 'If the bank will not hold charge: possible battery fault — {contact_step}'
- key: fridge_not_cooling
  when:
    has_category:
    - galley_appliances
  icon: 🧊
  cat: electrical
  catL: Electrical
  title: Fridge not cooling
  steps:
  - Check the DC breaker for that fridge at the main panel
  - Check battery voltage — fridges auto-shut off when the bank is low
  - Confirm the thermostat is not set to the warmest setting
  - Check the fridge fan is running — feel for airflow at the vents
  - Keep the door closed — allow 30 minutes to recover after power is restored
  - '{contact_step}'
- key: headsail_wont_furl
  when:
    is_sailing: true
  icon: ⛵
  cat: sails
  catL: Sails
  title: Headsail won't furl
  steps:
  - Check the furling line is not fouled on a cleat, winch, or jammer
  - Reduce sheet tension — but keep some pressure on the sail for a clean furl
  - Do NOT force — a heavily loaded sail cannot furl against full wind pressure
  - Head slightly into the wind to reduce pressure, then pull the furling line steadily
  - Check the furling drum at the bow for line tangles
  - '{contact_step}'
- key: autopilot
  when:
    has_category:
    - navigation_and_electronics
  icon: 🧭
  cat: nav
  catL: Navigation
  title: Autopilot not holding course
  steps:
  - Confirm the autopilot is properly engaged — display should show a hold mode
  - Check no large metal objects are near the compass sensor
  - Disengage and re-engage — sometimes resets drift
  - '{contact_step}'
- key: vhf_not_transmitting
  when:
    has_category:
    - navigation_and_electronics
  icon: 📻
  cat: nav
  catL: Navigation
  title: VHF not transmitting
  steps:
  - Check the DC breaker for the VHF at the main panel
  - Confirm volume is up and squelch is not fully closed
  - Try a radio check on a working channel
  - Check the antenna connection at the back of the radio
  - Report a non-functioning fixed VHF immediately — {contact_step}
- key: windlass
  when:
    has_category:
    - ground_tackle_and_mooring
  icon: ⚓
  cat: general
  catL: General
  title: Windlass not working
  steps:
  - Check the windlass circuit breaker — reset if tripped
  - Never run the windlass continuously more than 60 seconds — allow the motor to cool between runs
  - Check the remote/switch connection is plugged in and undamaged
  - Start an engine — the windlass draws high current and a low battery will kill it
  - '{contact_step}'
- key: ac_not_working
  when:
    has_category:
    - hvac
  icon: ❄️
  cat: electrical
  catL: Electrical
  title: Air conditioning not working
  steps:
  - Confirm AC power is available — shore power or generator running
  - Confirm the seawater cooling pump is running — AC units need seawater flow or they are destroyed
  - Check the AC circuit breaker on the electrical panel
  - Do not run all units simultaneously on generator — it may overload
  - '{contact_step}'
- key: bilge_alarm
  when:
    always: true
  icon: 🌊
  cat: plumbing
  catL: Plumbing
  title: Bilge alarm going off
  steps:
  - Identify which bilge compartment is alarming
  - Confirm the bilge pump switch is in AUTO — the alarm triggers when water rises
  - 'Look for the water source: raw water hose, seacock leak, shaft seal'
  - A small amount of water can be normal — confirm the pump has activated
  - 'If water is rising rapidly: identify the source — consider MAYDAY on Ch 16 if uncontrolled'
  - '{contact_step}'
