<app-header></app-header>
<ion-content [fullscreen]="true" class="page-content">
  <div class="chat-messages">
    <div *ngIf="chat.messages.length === 0" class="chat-welcome">
      <div class="chat-welcome-icon">📖</div>
      <div class="chat-welcome-title">Ask about the boat</div>
      <div class="chat-welcome-sub">
        Questions are answered from the ingested vessel manuals.
      </div>
      <div class="chat-suggestions">
        <button
          type="button"
          class="suggestion-chip"
          *ngFor="let suggestion of suggestions"
          (click)="useSuggestion(suggestion)"
        >
          {{ suggestion }}
        </button>
      </div>
    </div>

    <div
      *ngFor="let message of chat.messages; let messageIndex = index"
      class="chat-bubble-wrap"
      [class.user]="message.role === 'user'"
      [class.assistant]="message.role === 'assistant'"
    >
      <div class="chat-bubble" [class.user]="message.role === 'user'">
        {{ message.content }}
      </div>
      <div *ngIf="message.sources?.length" class="chat-sources">
        <div class="chat-sources-label">Sources</div>
        <div
          class="chat-source-chip"
          *ngFor="let group of sourceGroups(message)"
        >
          <ng-container *ngIf="group.pages.length; else untitledChip">
            <span class="chat-source-chip-title">{{ group.title }}</span>
            <span class="chat-source-pages" aria-label="Pages">
              <span class="chat-source-pages-sep">·</span>
              <ng-container
                *ngFor="let page of group.pages; let last = last"
              >
                <button
                  type="button"
                  class="chat-source-page-link"
                  [class.active]="
                    expandedSourceKey ===
                    sourceKey(messageIndex, page.sourceIndex)
                  "
                  (click)="toggleSource(messageIndex, page.sourceIndex)"
                >
                  {{ page.pageLabel }}
                </button>
                <span *ngIf="!last" class="chat-source-page-comma">, </span>
              </ng-container>
            </span>
          </ng-container>
          <ng-template #untitledChip>
            <button
              type="button"
              class="chat-source-chip-hit"
              [class.active]="
                group.untitledSources[0] &&
                expandedSourceKey ===
                  sourceKey(messageIndex, group.untitledSources[0].sourceIndex)
              "
              (click)="toggleUntitledGroup(messageIndex, group)"
            >
              <span class="chat-source-chip-title">{{ group.title }}</span>
            </button>
          </ng-template>
        </div>
        <div
          *ngIf="expandedSnippet(message, messageIndex) as snippetSource"
          class="chat-source-snippet"
        >
          {{ snippetSource.snippet }}
        </div>
      </div>
    </div>

    <div *ngIf="chat.isBusy" class="chat-typing">
      <span></span><span></span><span></span>
    </div>
  </div>
</ion-content>

<ion-footer class="chat-input-bar ion-no-border">
  <ion-toolbar>
    <div class="chat-input-row">
      <textarea
        class="chat-input"
        [(ngModel)]="draft"
        rows="1"
        placeholder="Ask a question..."
        (keydown.enter)="$event.preventDefault(); send()"
      ></textarea>
      <button
        type="button"
        class="chat-send-btn"
        [disabled]="chat.isBusy || !draft.trim()"
        (click)="send()"
        aria-label="Send question"
      >
        ➤
      </button>
    </div>
  </ion-toolbar>
</ion-footer>
