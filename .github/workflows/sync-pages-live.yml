name: Sync Pages live branch

on:
 workflow_dispatch: 
 push:
    branches: [main]
    paths:
      - 'app/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push app/ to pages-live root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin pages-live
          git checkout pages-live
          git checkout origin/main -- app
          rsync -a --delete app/ ./
          rm -rf app
          git add index.html manifest.json *.png
          git diff --staged --quiet || git commit -m "Sync from main/app"
          git push origin pages-live

