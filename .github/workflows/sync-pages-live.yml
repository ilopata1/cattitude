name: Sync Pages live branch

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push app/ to pages-live root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin pages-live
          git checkout pages-live
          # Clear tracked root files (avoid rsync app/ → ./ overlap; that deletes source mid-copy)
          git rm -rf .
          git checkout origin/main -- app
          cp -a app/. .
          rm -rf app
          git add -A
          git diff --staged --quiet || git commit -m "Sync from main/app"
          git push origin pages-live
