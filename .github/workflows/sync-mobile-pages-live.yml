name: Sync mobile web to pages-live

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'utilities/extract_bootstrap_content.mjs'
      - 'utilities/patch_github_pages_assets.mjs'
      - '.github/workflows/sync-mobile-pages-live.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install and build Ionic app
        working-directory: mobile
        run: |
          npm ci
          npm run build
          cp www/index.html www/404.html
          node ../utilities/patch_github_pages_assets.mjs www

      - name: Push mobile/www to pages-live root
        run: |
          cp -a mobile/www /tmp/cattitude-www
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin pages-live
          git checkout pages-live
          git rm -rf .
          cp -a /tmp/cattitude-www/. .
          git add -A
          git diff --staged --quiet || git commit -m "Sync from main/mobile/www"
          git push origin pages-live
